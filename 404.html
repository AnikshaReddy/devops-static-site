<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1a73e8, #4285f4);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
        }

        h1 {
            font-size: 100px;
            margin: 0;
        }

        h2 {
            font-size: 32px;
            margin: 10px 0;
        }

        p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        a {
            text-decoration: none;
            background: white;
            color: #1a73e8;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
        }

        a:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you are looking for does not exist or has been moved.</p>
        <a href="index.html">Go Back Home</a>
    </div>
</body>
</html>
